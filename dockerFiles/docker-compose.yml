services:
  db:
    image: postgres:16
    container_name: odoo-db
    environment:
      POSTGRES_USER: odoo      # Standard Odoo dev defaults
      POSTGRES_PASSWORD: odoo
    ports:
      - "5432:5432"

  # Odoo containers are created dynamically by the `oe` fish function,
  # not by this compose file. Nginx resolves them at request time.
  nginx:
    image: nginx:alpine
    container_name: odoo-nginx
    ports:
      - "8069:8069"
      - "8070:8070"
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

networks:
  default:
    name: odoo_dev

