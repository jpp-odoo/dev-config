# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions possible: hyprctl monitors
# Format: monitor = [port], resolution, position, scale

# ThinkPad L14 Gen 6 (1920x1200) + Dell S2725DC (2560x1440)
# Bottom-aligned: laptop on left, big screen on right
# Laptop at scale 1.25 → effective 1536x960, y-offset = 1440 - 960 = 480
env = GDK_SCALE,2
monitor = eDP-1, preferred, 0x480, 1.25
monitor = DP-2, preferred, 1536x0, 1

# Fallback for any other monitor or laptop-only
monitor = , preferred, auto, auto
