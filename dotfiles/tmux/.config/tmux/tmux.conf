unbind r
bind r source-file ~/.config/tmux/tmux.conf

set -g prefix C-s
set -g base-index 1
set -g renumber-windows on
# set -g detach-on-destroy off
# Keep window names as set manually
set-option -g automatic-rename off
set-option -g allow-rename off

# Force to use fish shell as the default shell
set-option -g default-shell /usr/bin/fish

# Force window names from tmuxinator
setw -g automatic-rename off

# only this line might not be enough
set -g default-terminal "xterm-256color"

# Needs this line also to overrides the default color
set-option -ga terminal-overrides ",xterm-256color:Tc"

set-option -g allow-passthrough on

set -g mouse on
set -g focus-events on

set-option -g status-position top

# Catppuccin theme
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @catppuccin_flavor 'mocha'

# Window styling: omerxx-like (name then block separator then number, zoom flag)
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_number_position 'right'
set -g @catppuccin_window_text ' #W'
set -g @catppuccin_window_current_text ' #W'
set -g @catppuccin_window_flags 'icon'
set -g @catppuccin_window_flags_icon_last ''

# Short clock
set -g @catppuccin_date_time_text '%H:%M'

# Status line composition (v2 requires explicit assembly)
set -g status-left-length 100
set -g status-right-length 100
set -g status-left '#{E:@catppuccin_status_session}'
set -g status-right '#{E:@catppuccin_status_directory}'
set -agF status-right '#{E:@catppuccin_status_date_time}'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

setenv -g TMUX_PLUGIN_MANAGER_PATH "~/.tmux/plugins/"

if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'
